name: Daily Scraper Crawler

on:
  schedule:
    # 每天 08:00 (台灣時間) -> UTC 00:00
    - cron: '0 0 * * *'
    # 每天 16:00 (台灣時間) -> UTC 08:00
    - cron: '0 8 * * *'
  workflow_dispatch: # 支援手動從網頁按鈕觸發

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install Dependencies
        working-directory: ./scraper
        run: uv sync

      - name: Install Playwright Browsers
        working-directory: ./scraper
        run: uv run playwright install chromium

      # 如果 GitHub Secrets 裡有存 FB_STATE_JSON / THREADS_STATE_JSON (包含 Cookies)，就先把它寫入到虛擬機裡
      - name: Prep Auth States
        working-directory: ./scraper
        env:
          FB_STATE_JSON: ${{ secrets.FB_STATE_JSON }}
          THREADS_STATE_JSON: ${{ secrets.THREADS_STATE_JSON }}
        run: |
          if [ -n "$FB_STATE_JSON" ]; then
            echo "$FB_STATE_JSON" > state.json
            echo "Successfully loaded FB state.json from secrets."
          fi
          if [ -n "$THREADS_STATE_JSON" ]; then
            echo "$THREADS_STATE_JSON" > threads_state.json
            echo "Successfully loaded Threads state.json from secrets."
          fi

      - name: Run Scraper
        working-directory: ./scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: uv run python src/main.py
